<svg viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2EEE7"/><stop offset="60%" stop-color="#EAE4DA"/><stop offset="100%" stop-color="#DED7CB"/>
    </linearGradient>
    <radialGradient id="disc" cx="40%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#1c231d"/><stop offset="55%" stop-color="#0e1610"/><stop offset="100%" stop-color="#070b08"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.12"/><stop offset="42%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/><stop offset="100%" stop-color="#fff" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="lblg" cx="46%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7DEEA9"/><stop offset="100%" stop-color="#22D96C"/>
    </radialGradient>
    <linearGradient id="jacket" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F6F2EB"/><stop offset="100%" stop-color="#E7E0D4"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="46%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.06"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#vig)"/>

  <!-- sombra del disco -->
  <ellipse cx="1080" cy="930" rx="258" ry="26" fill="#14120f" opacity="0.10"/>

  <!-- DISCO (detrás de la funda) -->
  <g>
    <circle cx="1080" cy="600" r="300" fill="url(#disc)"/>
    <circle cx="1080" cy="600" r="137.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="151.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="165.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="179.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="193.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="207.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="221.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="235.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="249.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="263.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="277.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/><circle cx="1080" cy="600" r="291.0" fill="none" stroke="#243026" stroke-width="1.1" opacity="0.4"/>
    <circle cx="1080" cy="600" r="300" fill="url(#sheen)"/>
    <circle cx="1080" cy="600" r="114" fill="none" stroke="#070b08" stroke-width="4"/>
    <circle cx="1080" cy="600" r="108" fill="url(#lblg)"/>
    <circle cx="1080" cy="600" r="108" fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="1080" y="584" font-family="'IBM Plex Mono',monospace" font-size="15" letter-spacing="3" fill="#0c1a10" text-anchor="middle" opacity="0.9">STUDIO AMR</text>
    <text x="1080" y="612" font-family="Georgia,serif" font-weight="bold" font-size="24" fill="#0c1a10" text-anchor="middle">BATUQUE</text>
    <text x="1080" y="634" font-family="'IBM Plex Mono',monospace" font-size="12" letter-spacing="2" fill="#0c1a10" text-anchor="middle" opacity="0.8">45 RPM</text>
    <circle cx="1080" cy="600" r="7" fill="#0c1a10"/>
  </g>

  <!-- sombra de la funda -->
  <ellipse cx="550.0" cy="954" rx="322" ry="30" fill="#14120f" opacity="0.12"/>

  <!-- FUNDA impresa (jacket) -->
  <g transform="rotate(-4 560.0 610.0)">
    <rect x="250" y="300" width="620" height="620" rx="8" fill="url(#jacket)" stroke="#141210" stroke-opacity="0.12" stroke-width="2"/>
    <rect x="250" y="300" width="620" height="620" rx="8" fill="none" stroke="#141210" stroke-opacity="0.06" stroke-width="10" transform="translate(0,0)"/>
    <line x1="868" y1="318" x2="868" y2="902" stroke="#141210" stroke-opacity="0.10" stroke-width="3"/>
    <text x="288" y="366" font-family="'IBM Plex Mono',monospace" font-size="20" letter-spacing="6" fill="#6E675E">STUDIO AMR</text>
    <text x="832" y="366" font-family="'IBM Plex Mono',monospace" font-size="20" letter-spacing="6" fill="#159E52" text-anchor="end">MMXXVI</text>
    <!-- marca / dibujo: tambor con ondas -->
    <g transform="translate(460.0 430) scale(1.0)">
      <ellipse cx="100" cy="112" rx="46" ry="46" fill="none" stroke="#141210" stroke-width="8"/>
      <ellipse cx="100" cy="112" rx="27" ry="27" fill="none" stroke="#22D96C" stroke-width="7"/>
      <path d="M162 88 Q186 112 162 136" fill="none" stroke="#7DEEA9" stroke-width="5" stroke-linecap="round"/>
      <path d="M38 88 Q14 112 38 136" fill="none" stroke="#7DEEA9" stroke-width="5" stroke-linecap="round"/>
      <line x1="100" y1="112" x2="126" y2="136" stroke="#141210" stroke-width="6" stroke-linecap="round"/>
      <circle cx="100" cy="112" r="6" fill="#141210"/>
      <circle cx="150" cy="96" r="3.4" fill="#22D96C"/><circle cx="60" cy="132" r="3" fill="#141210"/>
    </g>
    <text x="560.0" y="824" font-family="Georgia,serif" font-weight="bold" font-size="56" letter-spacing="1" fill="#141210" text-anchor="middle">BATUQUE</text>
    <text x="560.0" y="862" font-family="'IBM Plex Mono',monospace" font-size="15" letter-spacing="4" fill="#159E52" text-anchor="middle">BRAZILIAN TECH HOUSE · 0→100 · 25 MIN</text>
    <text x="560.0" y="888" font-family="'IBM Plex Mono',monospace" font-size="12" letter-spacing="3" fill="#6E675E" text-anchor="middle">EDITION OF 12 · NUMBERED BY HAND</text>
  </g>

  <!-- etiqueta de número escrita a mano (kraft) -->
  <g transform="rotate(6 1330 980)">
    <rect x="1180" y="930" width="300" height="120" rx="4" fill="#DcCfb6" stroke="#141210" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="1205" cy="990" r="7" fill="none" stroke="#141210" stroke-opacity="0.35" stroke-width="2"/>
    <text x="1250" y="978" font-family="'IBM Plex Mono',monospace" font-size="16" letter-spacing="3" fill="#6E675E">HAND-NUMBERED</text>
    <text x="1250" y="1022" font-family="Georgia,serif" font-weight="bold" font-size="34" fill="#141210">No 01 / 12</text>
  </g>
</svg>
