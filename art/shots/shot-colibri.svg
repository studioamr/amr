acity="0.25"/><circle cx="1080" cy="600" r="270.0" fill="none" stroke="#2a241d" stroke-width="1.1" opacity="0.5"/><circle cx="1080" cy="600" r="277.0" fill="none" stroke="#2a241d" stroke-width="1.1" opacity="0.25"/><circle cx="1080" cy="600" r="284.0" fill="none" stroke="#2a241d" stroke-width="1.1" opacity="0.5"/><circle cx="1080" cy="600" r="291.0" fill="none" stroke="#2a241d" stroke-width="1.1" opacity="0.25"/>
